name: First-Time Contributor Welcome

on:
  pull_request_target:
    types: [closed]

jobs:
  welcome-comment:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check if first-time contributor and post welcome
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;

            // Check if this is the author's first merged PR
            try {
              const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} type:pr author:${author} is:merged`,
              });
              // The current PR is already merged, so count > 1 means they have prior merged PRs
              if (searchResult.total_count > 1) {
                core.info(`${author} has ${searchResult.total_count} merged PRs, not a first-time contributor`);
                return;
              }
            } catch (err) {
              if (err.status === 422 && err.message && err.message.includes('cannot be searched')) {
                core.warning(`Search API cannot look up author ${author}, skipping`);
                return;
              }
              throw err;
            }

            const body = [
              `## Welcome to CoPaw! :tada:`,
              ``,
              `Thank you @${author} for your first contribution! Your PR has been merged. :rocket:`,
              ``,
              `We'd love to give you a shout-out in our release notes! If you're comfortable sharing, ` +
              `please reply to this comment with your social media handles using the format below:`,
              ``,
              '```',
              `discord: your_discord_handle`,
              `x: your_x_handle`,
              `xiaohongshu: your_xiaohongshu_id`,
              '```',
              ``,
              `> **Note:** Only share what you're comfortable with — all fields are optional.`,
              ``,
              `Thanks again for helping make CoPaw better!`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            core.info(`Posted welcome comment on PR #${prNumber} for @${author}`);
